services:
  - type: web
    name: libpro-api
    env: docker
    plan: free
    region: singapore
    dockerContext: .
    dockerfilePath: ./LibPro/Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__ValidAudience
        sync: false
      - key: Jwt__ValidIssuer
        sync: false
      - key: SecureToken__Key
        sync: false
      - key: Cors__AllowedOrigins
        sync: false
